<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High Alert Drug</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  display: flex;
  justify-content: center;
}

.main {
  max-width: 500px;
  width: 100%;
  padding: 15px;
}

.header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #e53935;
  margin-bottom: 15px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 15px;
  font-size: 16px;
}

.card {
  display: none; /* 🔥 ซ่อนตอนแรก */
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.section {
  margin-bottom: 10px;
}

.title {
  font-weight: bold;
  color: #d32f2f;
}

.drug-name {
  font-size: 18px;
  font-weight: bold;
  color: #1976d2;
  margin-bottom: 10px;
}

.summary {
  margin-top: 10px;
  padding: 10px;
  background: #fff3e0;
  border-radius: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="main">

<div class="header">🚑 High Alert Drug</div>

<select onchange="showDrug(this.value)">
  <option value="" disabled selected>👉 เลือกยาเพื่อแสดงข้อมูล</option>
  <option value="adrenaline">Adrenaline</option>
  <option value="levophed">Levophed</option>
  <option value="kcl">KCl</option>
  <option value="mgso4">MgSO4</option>
  <option value="ntg">NTG</option>
</select>

<div id="content" class="card"></div>

</div>

<script>
function showDrug(drug) {
  let content = "";
  const card = document.getElementById("content");

  if (!drug) {
    card.style.display = "none";
    return;
  }

  if (drug === "adrenaline") {
    content = `
    <div class="drug-name">Adrenaline</div>
    <div class="section"><span class="title">1. Indication:</span><br>
    Cardiac arrest, Anaphylaxis</div>

    <div class="section"><span class="title">2. Dose:</span><br>
    CPR: 1 mg IV q3-5 min<br>
    Anaphylaxis: 0.3–0.5 mg IM</div>

    <div class="section"><span class="title">3. Concentration:</span><br>
    CPR 1:10,000 (IV)<br>
    Anaphylaxis 1:1000 (IM)</div>

    <div class="section"><span class="title">4. Dilution:</span><br>
    CPR: 1 ml + NSS 9 ml → 1:10,000<br>
    Anaphylaxis: ไม่ต้องเจือจาง</div>

    <div class="summary">⚡ CPR: 1 mg IV | Anaphylaxis: IM เท่านั้น</div>
    `;
  }

  else if (drug === "levophed") {
    content = `
    <div class="drug-name">Levophed (Norepinephrine)</div>
    <div class="section"><span class="title">1. Indication:</span><br>
    Septic shock, Hypotension</div>

    <div class="section"><span class="title">2. Dose:</span><br>
    Initial: 8-12 mcg/min<br>
    Maximun dose: 30 mcg/min</div>

    <div class="section"><span class="title">3. Concentration:</span><br>
    4 mg/4 ml</div>

    <div class="section"><span class="title">4. Dilution:</span><br>
    Dilution: D5W, D5S<br>
    (4:250) -> 4 mg + D5W 250 ml</div>

    <div class="summary">⚡ Titrate ตาม MAP | ห้ามหยุดทันที | ใช้ infusion pump</div>
    `;
  }

  else if (drug === "kcl") {
    content = `
    <div class="drug-name">Potassium Chloride (KCl)</div>
    <div class="section"><span class="title">1. Indication:</span><br>
    Hypokalemia</div>

    <div class="section"><span class="title">2. Dose:</span><br>
    Max infusion rate: 10 mEq/hr<br>
    Max dose/day: 200-400 mEq</div>

    <div class="section"><span class="title">3. Concentration:</span><br>
    Peripheral: ≤ 80 mEq/L<br>
    Central line: ≤ 100 mEq/L</div>

    <div class="section"><span class="title">4. Dilution:</span><br>
    dilute ใน NSS/D5W และให้ผ่าน infusion pump</div>

    <div class="summary">⚡ ห้าม IV push | เสี่ยง cardiac arrest</div>
    `;
  }

  else if (drug === "mgso4") {
    content = `
    <div class="drug-name">Magnesium Sulfate (MgSO4)</div>
    <div class="section"><span class="title">1. Indication:</span><br>
    Torsades de point, Hypomagnesemia</div>

    <div class="section"><span class="title">2. Dose:</span><br>
    Torsades de pointes: 1–2 g IV over 10–15 min<br><br>
    Hypomagnesemia: 1–2 g IV infusion (ตามระดับ Mg)</div>

    <div class="section"><span class="title">3. Concentration:</span><br>
    10% (1 g/10 ml) | 50% (1 g/2 ml)</div>

    <div class="section"><span class="title">4. Dilution:</span><br>
    dilute in NSS/D5W → IV infusion pump</div>

    <div class="summary">⚡ ให้ช้า | monitor RR และ reflex</div>
    `;
  }

  else if (drug === "ntg") {
    content = `
    <div class="drug-name">Nitroglycerin (NTG)</div>
    <div class="section"><span class="title">1. Indication:</span><br>
    Chest pain, ACS, HT crisis</div>

    <div class="section"><span class="title">2. Dose:</span><br>
    Initial: 5 mcg/min<br>
    Maximum dose: 200 mcg/min</div>

    <div class="section"><span class="title">3. Concentration:</span><br>
    50 mg/10 ml</div>

    <div class="section"><span class="title">4. Dilution:</span><br>
    dilute ใน NSS/D5W | ห้ามให้ IV push และ IM</div>

    <div class="summary">⚡ ระวัง BP drop | titrate ตาม BP & chest pain</div>
    `;
  }

  card.innerHTML = content;
  card.style.display = "block"; // 🔥 แสดงเมื่อเลือกยา
}
</script>

</body>
</html>
